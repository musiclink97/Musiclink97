<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MusicMap</title>
  <style>
    * { box-sizing: border-box; }
    :root{
      --bg:#0f1115;
      --card:#171a21;
      --soft:#222734;
      --text:#f3f4f6;
      --muted:#9ca3af;
      --line:#2b3140;
      --blue:#2563eb;
      --violet:#8b5cf6;
      --red:#ef4444;
      --green:#10b981;
      --gold:#f59e0b;
    }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      background:linear-gradient(180deg,#10131a,#0c0f14);
      color:var(--text);
    }

    a{
      color:#93c5fd;
      text-decoration:none;
    }

    a:hover{
      text-decoration:underline;
    }

    .hidden{ display:none !important; }

    header{
      position:sticky;
      top:0;
      z-index:80;
      background:rgba(15,17,21,.96);
      backdrop-filter:blur(12px);
      border-bottom:1px solid var(--line);
      padding:12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .brand{
      font-size:20px;
      font-weight:800;
    }

    .sub{
      font-size:12px;
      color:var(--muted);
    }

    .header-actions{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .header-btn{
      background:#111827;
      color:white;
      border:1px solid var(--line);
      border-radius:10px;
      padding:8px 10px;
      position:relative;
    }

    .container{
      max-width:760px;
      margin:0 auto;
      padding:12px 12px 96px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      margin-bottom:12px;
    }

    .title{
      font-size:18px;
      font-weight:800;
      margin-bottom:6px;
    }

    .muted{
      color:var(--muted);
      font-size:14px;
    }

    .small{
      font-size:12px;
      color:var(--muted);
    }

    .row{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .between{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .avatar{
      width:44px;
      height:44px;
      border-radius:50%;
      overflow:hidden;
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      background:linear-gradient(135deg,var(--blue),var(--violet));
      color:white;
    }

    .avatar img,
    .story-avatar img,
    .hero-avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .hero-avatar{
      width:76px;
      height:76px;
      border-radius:50%;
      overflow:hidden;
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      font-weight:800;
      background:linear-gradient(135deg,var(--blue),var(--violet));
      color:white;
    }

    input, textarea, select{
      width:100%;
      padding:11px;
      margin-top:8px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#0f131b;
      color:var(--text);
      font-size:14px;
      outline:none;
    }

    textarea{
      min-height:90px;
      resize:vertical;
    }

    input[type="file"]{
      padding:10px;
    }

    button{
      border:none;
      border-radius:12px;
      padding:10px 14px;
      font-weight:800;
      cursor:pointer;
    }

    .btn-main{
      background:linear-gradient(135deg,var(--blue),var(--violet));
      color:white;
    }

    .btn-soft{
      background:var(--soft);
      color:white;
    }

    .btn-red{
      background:var(--red);
      color:white;
    }

    .btn-green{
      background:var(--green);
      color:#04130d;
    }

    .tabs{
      display:flex;
      gap:8px;
      overflow:auto;
      padding-bottom:4px;
    }

    .tabs::-webkit-scrollbar,
    .stories::-webkit-scrollbar{
      display:none;
    }

    .tabs button.active{
      background:linear-gradient(135deg,var(--blue),var(--violet));
      color:white;
    }

    .stories{
      display:flex;
      gap:10px;
      overflow:auto;
      padding-bottom:6px;
      margin-bottom:12px;
    }

    .story{
      min-width:82px;
      text-align:center;
    }

    .story-avatar{
      width:58px;
      height:58px;
      border-radius:50%;
      margin:auto;
      margin-bottom:6px;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,var(--blue),var(--violet));
      color:white;
      font-weight:800;
    }

    .post{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      margin-bottom:14px;
      position:relative;
    }

    .post-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px;
    }

    .post-user{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .post-user-info{
      min-width:0;
    }

    .post-user-info b,
    .post-user-info div{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .post-media{
      width:100%;
      display:block;
      background:#0b0d12;
    }

    img.post-media{
      width:100%;
      height:auto;
      max-height:80vh;
      object-fit:contain;
      background:#0b0d12;
    }

    video.post-media{
      width:100%;
      max-height:80vh;
      background:#0b0d12;
    }

    .post-body{
      padding:10px;
    }

    .post-actions{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      font-size:20px;
      margin-bottom:8px;
    }

    .post-actions span{
      cursor:pointer;
    }

    .stats{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      font-size:13px;
      color:var(--muted);
      margin-bottom:8px;
    }

    .comment{
      background:#111827;
      border-radius:10px;
      padding:8px 10px;
      margin-top:8px;
      font-size:14px;
    }

    .comment-row{
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:flex-start;
    }

    .comment-row button{
      background:#222734;
      color:white;
      padding:4px 8px;
      font-size:12px;
      border-radius:8px;
    }

    .menu-wrap{
      position:relative;
      flex-shrink:0;
    }

    .menu-btn{
      background:none;
      color:white;
      font-size:22px;
      padding:4px 8px;
      line-height:1;
    }

    .menu{
      position:absolute;
      top:34px;
      right:0;
      min-width:170px;
      background:#111827;
      border:1px solid var(--line);
      border-radius:12px;
      padding:6px;
      z-index:30;
      box-shadow:0 10px 24px rgba(0,0,0,.35);
    }

    .menu button{
      width:100%;
      text-align:left;
      background:none;
      color:white;
      padding:10px;
      border-radius:10px;
    }

    .menu button:hover{
      background:#1f2937;
    }

    .list-item{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      margin-bottom:12px;
    }

    .pill{
      display:inline-block;
      background:#172554;
      color:#bfdbfe;
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      margin-top:8px;
      margin-right:6px;
    }

    .pill.green{
      background:#052e24;
      color:#a7f3d0;
    }

    .map{
      position:relative;
      height:320px;
      border-radius:16px;
      overflow:hidden;
      border:1px solid var(--line);
      background:
        radial-gradient(circle at 20% 30%, rgba(37,99,235,.18), transparent 20%),
        radial-gradient(circle at 70% 60%, rgba(139,92,246,.15), transparent 20%),
        linear-gradient(180deg,#151923,#0f1115);
    }

    .pin{
      position:absolute;
      transform:translate(-50%,-50%);
      background:linear-gradient(135deg,var(--blue),var(--violet));
      color:white;
      padding:6px 9px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
      white-space:nowrap;
    }

    .notif-badge{
      position:absolute;
      top:-4px;
      right:-4px;
      background:var(--red);
      color:white;
      border-radius:999px;
      font-size:10px;
      padding:2px 6px;
      line-height:1.2;
    }

    .file-link{
      display:inline-block;
      margin-top:8px;
      padding:6px 10px;
      border-radius:999px;
      background:#172554;
      font-size:12px;
      color:#bfdbfe;
    }

    .nav{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:70;
      background:#111;
      border-top:1px solid var(--line);
      display:flex;
      justify-content:space-around;
      padding:8px;
    }

    .nav button{
      background:none;
      color:#aaa;
      display:flex;
      flex-direction:column;
      align-items:center;
      font-size:12px;
      min-width:54px;
      position:relative;
    }

    .nav button.active{
      color:white;
    }

    .empty{
      color:var(--muted);
      font-size:14px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">
    <div style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#2563eb,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:20px;">🎵</div>
    <div>
      <div class="brand">MusicMap</div>
      <div class="sub">Connecte les talents</div>
    </div>
  </div>

  <div class="header-actions">
    <button class="header-btn" onclick="nav('mapSection')">📍</button>
    <button class="header-btn" onclick="nav('notif')">
      🔔
      <span id="notifTopBadge" class="notif-badge hidden">0</span>
    </button>
  </div>
</header>

<div class="container">

  <section id="feed">
    <div class="stories" id="stories"></div>

    <div class="card">
      <div class="title">Publier</div>
      <div class="small">Photo, vidéo, audio ou live annoncé.</div>

      <select id="postType">
        <option value="photo">Photo</option>
        <option value="video">Vidéo</option>
        <option value="audio">Audio</option>
        <option value="live">Live</option>
      </select>

      <input id="title" placeholder="Titre">
      <textarea id="caption" placeholder="Description"></textarea>
      <input type="file" id="postFile" accept="image/*,video/*,audio/*">
      <input id="media" placeholder="Ou colle un lien image / vidéo / audio">
      <input id="postLocation" placeholder="Lieu (ex: Saint-Denis)">
      <button class="btn-main" onclick="createPost()">Publier</button>
    </div>

    <div id="feedList"></div>
  </section>

  <section id="discover" class="hidden">
    <div class="card">
      <div class="title">Découvrir</div>
      <input id="searchDiscover" placeholder="Chercher un talent, ville, métier..." oninput="renderDiscover()">
    </div>
    <div id="discoverList"></div>
  </section>

  <section id="mapSection" class="hidden">
    <div class="card">
      <div class="title">Map</div>
      <div class="small">Clique sur un point pour voir le profil.</div>
      <div class="map" id="mapBox"></div>
    </div>
    <div id="mapProfile"></div>
  </section>

  <section id="notif" class="hidden">
    <div class="card">
      <div class="title">Notifications</div>
      <div class="small">Tout ce qui se passe sur ton compte.</div>
    </div>
    <div id="notifList"></div>
  </section>

  <section id="messages" class="hidden">
    <div class="card">
      <div class="title">Messages</div>
      <select id="messageTarget"></select>
      <textarea id="messageText" placeholder="Écris un message"></textarea>
      <input type="file" id="messageFile">
      <div class="row">
        <button class="btn-main" onclick="sendMessage()">Envoyer</button>
        <button class="btn-soft" id="recordBtn" onclick="toggleRecord()">🎤 Vocal</button>
      </div>
      <div id="recordStatus" class="small"></div>
    </div>
    <div id="messagesList"></div>
  </section>

  <section id="profile" class="hidden">
    <div class="card">
      <div class="row">
        <div class="hero-avatar" id="profileAvatarHero">👤</div>
        <div>
          <div class="brand" id="profileHeroName">Mon profil</div>
          <div class="sub" id="profileHeroRole">Aucun profil</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="tabs">
        <button id="tab-btn-overview" class="active" onclick="showProfileTab('overview')">Aperçu</button>
        <button id="tab-btn-likes" onclick="showProfileTab('likes')">J’aime</button>
        <button id="tab-btn-archive" onclick="showProfileTab('archive')">Archives</button>
        <button id="tab-btn-blocked" onclick="showProfileTab('blocked')">Bloqués</button>
      </div>

      <div id="tab-overview">
        <select id="role" onchange="toggleRole()">
          <option>Artiste</option>
          <option>Beatmaker</option>
          <option>Caméraman</option>
          <option>Danseur</option>
          <option>Graphiste</option>
          <option>DJ</option>
          <option>Décorateur</option>
          <option>Cascadeur</option>
          <option>Monteur</option>
          <option>Photographe</option>
          <option>Ingé son</option>
          <option>Studio</option>
          <option>Styliste</option>
          <option>Manager</option>
          <option>Producteur</option>
          <option>Autre</option>
        </select>

        <input id="customRole" class="hidden" placeholder="Ton métier exact">
        <input id="name" placeholder="Nom">
        <input id="city" placeholder="Ville">
        <input id="photo" placeholder="Photo URL">
        <input id="specialty" placeholder="Spécialité">
        <input id="contact" placeholder="Contact">
        <input id="website" placeholder="Lien / site / réseau">
        <input id="collab" placeholder="Je cherche / je propose">
        <textarea id="bio" placeholder="Bio"></textarea>

        <button class="btn-main" onclick="saveProfile()">Enregistrer</button>
      </div>

      <div id="tab-likes" class="hidden"></div>
      <div id="tab-archive" class="hidden"></div>
      <div id="tab-blocked" class="hidden"></div>
    </div>
  </section>

</div>

<div class="nav">
  <button class="active" data-target="feed" onclick="nav('feed', this)">
    <div>🏠</div>
    <div>Accueil</div>
  </button>

  <button data-target="discover" onclick="nav('discover', this)">
    <div>🔍</div>
    <div>Découvrir</div>
  </button>

  <button data-target="messages" onclick="nav('messages', this)">
    <div>💬</div>
    <div>Messages</div>
  </button>

  <button data-target="profile" onclick="nav('profile', this)">
    <div>👤</div>
    <div>Profil</div>
  </button>
</div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")) || [];
let likes = JSON.parse(localStorage.getItem("likes")) || [];
let archive = JSON.parse(localStorage.getItem("archive")) || [];
let blocked = JSON.parse(localStorage.getItem("blocked")) || [];
let hiddenPosts = JSON.parse(localStorage.getItem("hiddenPosts")) || [];
let notif = JSON.parse(localStorage.getItem("notif")) || [];
let profile = JSON.parse(localStorage.getItem("profile")) || null;
let messages = JSON.parse(localStorage.getItem("messages")) || [];
let openMenuId = null;
let currentSection = "feed";

let mediaRecorder = null;
let audioChunks = [];
let recording = false;

const defaultTalents = [
  {name:"Luna K", role:"Artiste", city:"Saint-Denis", x:30, y:30, bio:"Artiste en développement", specialty:"Rap mélodique"},
  {name:"Studio 974", role:"Studio", city:"Saint-Denis", x:65, y:40, bio:"Enregistrement / mix", specialty:"Studio"},
  {name:"Lina Cam", role:"Caméraman", city:"Saint-Pierre", x:50, y:72, bio:"Clips / backstage", specialty:"Vidéo"}
];

function save(){
  localStorage.setItem("posts", JSON.stringify(posts));
  localStorage.setItem("likes", JSON.stringify(likes));
  localStorage.setItem("archive", JSON.stringify(archive));
  localStorage.setItem("blocked", JSON.stringify(blocked));
  localStorage.setItem("hiddenPosts", JSON.stringify(hiddenPosts));
  localStorage.setItem("notif", JSON.stringify(notif));
  localStorage.setItem("profile", JSON.stringify(profile));
  localStorage.setItem("messages", JSON.stringify(messages));
}

function nav(id, btn){
  currentSection = id;
  document.querySelectorAll(".container > section").forEach(x=>x.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");

  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  if(btn){
    btn.classList.add("active");
  }else{
    const autoBtn = document.querySelector(`.nav button[data-target="${id}"]`);
    if(autoBtn) autoBtn.classList.add("active");
  }

  if(id === "mapSection") renderMap();
  if(id === "notif") renderNotifications();
  if(id === "discover") renderDiscover();
  if(id === "messages") renderMessages();
}

function addNotif(text){
  notif.unshift({
    text,
    date: new Date().toLocaleString()
  });
  save();
}

function createPost(){
  let title = document.getElementById("title").value.trim();
  let media = document.getElementById("media").value.trim();
  let caption = document.getElementById("caption").value.trim();
  let type = document.getElementById("postType").value;
  let location = document.getElementById("postLocation").value.trim();
  let file = document.getElementById("postFile").files[0];

  if(!title){
    alert("Ajoute un titre");
    return;
  }

  function finish(mediaValue){
    posts.unshift({
      id: Date.now(),
      title,
      caption,
      media: mediaValue || "",
      type,
      location,
      likes: 0,
      views: 0,
      shares: 0,
      comments: [],
      collabs: [],
      author: profile?.name || "Moi",
      role: profile?.role || "Talent",
      createdAt: Date.now(),
      replyTo: null
    });

    addNotif("Nouveau post publié");
    document.getElementById("title").value = "";
    document.getElementById("caption").value = "";
    document.getElementById("media").value = "";
    document.getElementById("postLocation").value = "";
    document.getElementById("postFile").value = "";
    save();
    renderAll();
  }

  if(file){
    const reader = new FileReader();
    reader.onload = e => finish(e.target.result);
    reader.readAsDataURL(file);
  } else {
    finish(media);
  }
}

function createCreativeReply(parentId){
  const parentPost = posts.find(p => p.id === parentId);
  if(!parentPost) return;

  const title = prompt("Titre de ta réponse créative");
  if(!title || !title.trim()) return;

  const caption = prompt("Description de ta réponse") || "";
  const media = prompt("Lien de ta photo / vidéo / audio") || "";
  const type = prompt("Type : photo, video ou audio", "video") || "video";

  posts.unshift({
    id: Date.now(),
    title: title.trim(),
    caption: caption.trim(),
    media: media.trim(),
    type: type === "audio" ? "audio" : type === "photo" ? "photo" : "video",
    location: profile?.city || "",
    likes: 0,
    views: 0,
    shares: 0,
    comments: [],
    collabs: [],
    author: profile?.name || "Moi",
    role: profile?.role || "Talent",
    createdAt: Date.now(),
    replyTo: parentId
  });

  addNotif(`Réponse créative envoyée à "${parentPost.title}"`);
  save();
  renderAll();
}

function proposeCollab(postId){
  const post = posts.find(p => p.id === postId);
  if(!post) return;

  const message = prompt("Décris ta proposition de collaboration");
  if(!message || !message.trim()) return;

  if(!post.collabs) post.collabs = [];
  post.collabs.push({
    name: profile?.name || "Moi",
    role: profile?.role || "Talent",
    message: message.trim(),
    date: new Date().toLocaleString()
  });

  addNotif(`Proposition de collab envoyée à "${post.title}"`);
  save();
  renderAll();
}

function renderPostMedia(p){
  if(p.type === "video"){
    return p.media ? `<video class="post-media" controls><source src="${p.media}"></video>` : "";
  }
  if(p.type === "audio"){
    return p.media ? `<div class="post-body"><audio controls style="width:100%"><source src="${p.media}"></audio></div>` : "";
  }
  if(p.type === "live"){
    return `<div class="post-body"><div class="file-link">🔴 Live annoncé</div></div>`;
  }
  return p.media ? `<img class="post-media" src="${p.media}" alt="">` : "";
}

function renderPosts(list, targetId, withMenu=true){
  let html = "";
  list.forEach(p=>{
    if(archive.includes(p.id)) return;
    if(hiddenPosts.includes(p.id)) return;
    if(blocked.includes(p.author)) return;

    const isMine = (profile?.name || "Moi") === p.author;

    html += `
      <div class="post">
        <div class="post-head">
          <div class="post-user">
            <div class="avatar">
              ${(profile && profile.photo && p.author === profile.name)
                ? `<img src="${profile.photo}">`
                : (p.author || "M").charAt(0)}
            </div>
            <div class="post-user-info">
              <div><b>${p.author || "Moi"}</b></div>
              <div class="small">${p.role || ""}${p.location ? " • " + p.location : ""}</div>
            </div>
          </div>

          ${withMenu ? `
          <div class="menu-wrap">
            <button class="menu-btn" onclick="toggleMenu(${p.id}, event)">⋯</button>
            <div id="menu-${p.id}" class="menu ${openMenuId===p.id ? '' : 'hidden'}">
              ${isMine ? `<button onclick="editPost(${p.id})">✏️ Modifier</button>` : ""}
              ${isMine ? `<button onclick="deletePost(${p.id})">🗑️ Supprimer</button>` : ""}
              <button onclick="archivePost(${p.id})">📦 Archiver</button>
              <button onclick="hidePost(${p.id})">🙈 Masquer</button>
              <button onclick="confirmBlock('${p.author || ""}')">⛔ Bloquer</button>
              <button onclick="reportPost()">⚠️ Signaler</button>
            </div>
          </div>` : ""}
        </div>

        ${renderPostMedia(p)}

        <div class="post-body">
          <div><b>${p.title}</b></div>
          ${p.replyTo ? `<div class="small">Réponse créative à un post</div>` : ""}
          ${p.caption ? `<div style="margin-top:6px">${p.caption}</div>` : ""}

          ${(p.collabs && p.collabs.length) ? `<div class="pill green">${p.collabs.length} proposition(s) de collab</div>` : ""}

          <div class="stats">
            <span>👀 ${p.views || 0} vues</span>
            <span>❤️ ${p.likes || 0} j’aime</span>
            <span>💬 ${p.comments.length} commentaires</span>
            <span>🔁 ${p.shares || 0} partages</span>
          </div>

          <div class="post-actions">
            <span onclick="like(${p.id})">❤️</span>
            <span onclick="commentPost(${p.id})">💬</span>
            <span onclick="sharePost(${p.id})">🔁</span>
            <span onclick="createCreativeReply(${p.id})">🎨</span>
            <span onclick="proposeCollab(${p.id})">🤝</span>
          </div>

          ${(p.comments || []).map((c, index)=>`
            <div class="comment">
              <div class="comment-row">
                <div>${c}</div>
                <button onclick="deleteComment(${p.id}, ${index})">Suppr</button>
              </div>
            </div>
          `).join("")}
        </div>
      </div>
    `;
  });

  document.getElementById(targetId).innerHTML = html || `<div class="card empty">Rien ici pour le moment.</div>`;
}

function renderFeed(){
  renderPosts(posts, "feedList", true);
}

function toggleMenu(id, event){
  event.stopPropagation();
  openMenuId = openMenuId === id ? null : id;
  renderFeed();
}

document.addEventListener("click", ()=> {
  if(openMenuId !== null){
    openMenuId = null;
    renderFeed();
  }
});

function like(id){
  let p = posts.find(x=>x.id===id);
  if(!p) return;
  p.likes++;
  likes.push(id);
  addNotif("Tu as liké un post");
  save();
  renderAll();
}

function commentPost(id){
  let text = prompt("Écris ton commentaire");
  if(!text || !text.trim()) return;
  let p = posts.find(x=>x.id===id);
  if(!p) return;
  p.comments.push(text.trim());
  addNotif("Nouveau commentaire");
  save();
  renderAll();
}

function deleteComment(postId, index){
  let p = posts.find(x=>x.id===postId);
  if(!p) return;
  p.comments.splice(index,1);
  save();
  renderAll();
}

function sharePost(id){
  let p = posts.find(x=>x.id===id);
  if(!p) return;
  p.shares = (p.shares || 0) + 1;
  addNotif("Post partagé");
  save();
  renderAll();
}

function editPost(id){
  let p = posts.find(x=>x.id===id);
  if(!p) return;

  let newTitle = prompt("Modifier le titre", p.title);
  if(newTitle !== null && newTitle.trim()) p.title = newTitle.trim();

  let newCaption = prompt("Modifier la description", p.caption || "");
  if(newCaption !== null) p.caption = newCaption.trim();

  save();
  renderAll();
}

function deletePost(id){
  if(!confirm("Supprimer ce post ?")) return;
  posts = posts.filter(x=>x.id!==id);
  save();
  renderAll();
}

function archivePost(id){
  if(!archive.includes(id)) archive.push(id);
  save();
  renderAll();
}

function hidePost(id){
  if(!hiddenPosts.includes(id)) hiddenPosts.push(id);
  save();
  renderAll();
}

function confirmBlock(name){
  if(!name) return;
  if(confirm("Tu veux vraiment bloquer " + name + " ?")){
    blockUser(name);
  }
}

function blockUser(name){
  if(!blocked.includes(name)) blocked.push(name);
  save();
  renderAll();
}

function reportPost(){
  alert("Signalement envoyé");
}

function renderNotifications(){
  let html = notif.map(n=>`
    <div class="list-item">
      <div><b>${typeof n === "string" ? n : n.text}</b></div>
      <div class="small">${typeof n === "string" ? "" : n.date}</div>
    </div>
  `).join("");
  document.getElementById("notifList").innerHTML = html || `<div class="card empty">Aucune notification.</div>`;
}

function renderNotifBadge(){
  const top = document.getElementById("notifTopBadge");
  if(notif.length){
    top.classList.remove("hidden");
    top.textContent = notif.length > 9 ? "9+" : notif.length;
  }else{
    top.classList.add("hidden");
  }
}

function toggleRole(){
  let r = document.getElementById("role").value;
  document.getElementById("customRole").classList.toggle("hidden", r !== "Autre");
}

function saveProfile(){
  const selectedRole = document.getElementById("role").value;
  const customRole = document.getElementById("customRole").value.trim();

  profile = {
    name: document.getElementById("name").value.trim(),
    photo: document.getElementById("photo").value.trim(),
    city: document.getElementById("city").value.trim(),
    specialty: document.getElementById("specialty").value.trim(),
    contact: document.getElementById("contact").value.trim(),
    website: document.getElementById("website").value.trim(),
    collab: document.getElementById("collab").value.trim(),
    bio: document.getElementById("bio").value.trim(),
    role: selectedRole === "Autre" && customRole ? customRole : selectedRole
  };

  save();
  addNotif("Profil enregistré");
  alert("Profil enregistré");
  renderAll();
}

function renderProfile(){
  const heroName = document.getElementById("profileHeroName");
  const heroRole = document.getElementById("profileHeroRole");
  const heroAvatar = document.getElementById("profileAvatarHero");

  if(!profile){
    heroName.textContent = "Mon profil";
    heroRole.textContent = "Aucun profil";
    heroAvatar.innerHTML = "👤";
    return;
  }

  heroName.textContent = profile.name || "Mon profil";
  heroRole.textContent = `${profile.role || ""}${profile.city ? " • " + profile.city : ""}`;
  heroAvatar.innerHTML = profile.photo ? `<img src="${profile.photo}">` : (profile.name || "M").charAt(0);

  document.getElementById("name").value = profile.name || "";
  document.getElementById("photo").value = profile.photo || "";
  document.getElementById("city").value = profile.city || "";
  document.getElementById("specialty").value = profile.specialty || "";
  document.getElementById("contact").value = profile.contact || "";
  document.getElementById("website").value = profile.website || "";
  document.getElementById("collab").value = profile.collab || "";
  document.getElementById("bio").value = profile.bio || "";

  const knownRoles = [
    "Artiste","Beatmaker","Caméraman","Danseur","Graphiste","DJ","Décorateur",
    "Cascadeur","Monteur","Photographe","Ingé son","Studio","Styliste","Manager","Producteur"
  ];

  if(knownRoles.includes(profile.role)){
    document.getElementById("role").value = profile.role;
    document.getElementById("customRole").classList.add("hidden");
    document.getElementById("customRole").value = "";
  }else{
    document.getElementById("role").value = "Autre";
    document.getElementById("customRole").classList.remove("hidden");
    document.getElementById("customRole").value = profile.role || "";
  }
}

function showProfileTab(tab){
  ["overview","likes","archive","blocked"].forEach(t=>{
    document.getElementById("tab-"+t).classList.add("hidden");
    document.getElementById("tab-btn-"+t).classList.remove("active");
  });
  document.getElementById("tab-"+tab).classList.remove("hidden");
  document.getElementById("tab-btn-"+tab).classList.add("active");
}

function renderProfileLists(){
  const likedPosts = posts.filter(p => likes.includes(p.id));
  document.getElementById("tab-likes").innerHTML = likedPosts.length
    ? likedPosts.map(p=>`<div class="list-item"><b>${p.title}</b><div class="small">${p.author || ""}</div></div>`).join("")
    : `<div class="empty">Aucun j’aime.</div>`;

  const archivedPosts = posts.filter(p => archive.includes(p.id));
  document.getElementById("tab-archive").innerHTML = archivedPosts.length
    ? archivedPosts.map(p=>`<div class="list-item"><b>${p.title}</b></div>`).join("")
    : `<div class="empty">Aucune archive.</div>`;

  document.getElementById("tab-blocked").innerHTML = blocked.length
    ? blocked.map(name=>`
        <div class="list-item between">
          <div>${name}</div>
          <button class="btn-soft" onclick="unblock('${name}')">Débloquer</button>
        </div>
      `).join("")
    : `<div class="empty">Aucun compte bloqué.</div>`;
}

function unblock(name){
  blocked = blocked.filter(x=>x!==name);
  save();
  renderAll();
}

function renderDiscover(){
  const q = (document.getElementById("searchDiscover").value || "").toLowerCase();
  const allTalents = [...defaultTalents];

  if(profile && profile.name){
    allTalents.push({
      name: profile.name,
      role: profile.role || "Talent",
      city: profile.city || "",
      bio: profile.bio || "",
      specialty: profile.specialty || "",
      website: profile.website || "",
      x: 55,
      y: 52
    });
  }

  const unique = [];
  const seen = new Set();
  allTalents.forEach(t=>{
    if(!seen.has(t.name)){
      seen.add(t.name);
      unique.push(t);
    }
  });

  const filtered = unique.filter(t => {
    if(blocked.includes(t.name)) return false;
    const text = `${t.name} ${t.role} ${t.city} ${t.bio||""} ${t.specialty||""}`.toLowerCase();
    return text.includes(q);
  });

  document.getElementById("discoverList").innerHTML = filtered.length
    ? filtered.map(t=>`
      <div class="list-item">
        <div class="row">
          <div class="avatar">${t.name.charAt(0)}</div>
          <div>
            <div><b>${t.name}</b></div>
            <div class="small">${t.role}${t.city ? " • " + t.city : ""}</div>
          </div>
        </div>
        ${t.specialty ? `<div class="pill">${t.specialty}</div>` : ""}
        ${t.bio ? `<div class="small" style="margin-top:8px">${t.bio}</div>` : ""}
      </div>
    `).join("")
    : `<div class="card empty">Aucun résultat.</div>`;
}

function renderMap(){
  const map = document.getElementById("mapBox");
  const box = document.getElementById("mapProfile");
  const allTalents = [...defaultTalents];

  if(profile && profile.name){
    allTalents.push({
      name: profile.name,
      role: profile.role || "Talent",
      city: profile.city || "",
      bio: profile.bio || "",
      specialty: profile.specialty || "",
      website: profile.website || "",
      x: 55,
      y: 52
    });
  }

  const unique = [];
  const seen = new Set();
  allTalents.forEach(t=>{
    if(!seen.has(t.name)){
      seen.add(t.name);
      unique.push(t);
    }
  });

  map.innerHTML = "";
  box.innerHTML = "";

  unique.forEach(t=>{
    if(blocked.includes(t.name)) return;
    const pin = document.createElement("div");
    pin.className = "pin";
    pin.style.left = (t.x || 50) + "%";
    pin.style.top = (t.y || 50) + "%";
    pin.textContent = t.name;
    pin.onclick = () => {
      box.innerHTML = `
        <div class="card">
          <div class="row">
            <div class="avatar">${t.name.charAt(0)}</div>
            <div>
              <div><b>${t.name}</b></div>
              <div class="small">${t.role}${t.city ? " • " + t.city : ""}</div>
            </div>
          </div>
          ${t.specialty ? `<div class="pill">${t.specialty}</div>` : ""}
          ${t.bio ? `<div class="small" style="margin-top:8px">${t.bio}</div>` : ""}
          ${t.website ? `<div style="margin-top:8px"><a href="${t.website}" target="_blank">Voir le lien</a></div>` : ""}
        </div>
      `;
    };
    map.appendChild(pin);
  });
}

function renderStories(){
  const box = document.getElementById("stories");
  const items = [...defaultTalents];
  if(profile && profile.name){
    items.unshift({name: profile.name, photo: profile.photo || ""});
  }

  box.innerHTML = items.slice(0,6).map(t=>`
    <div class="story">
      <div class="story-avatar">
        ${t.photo ? `<img src="${t.photo}">` : (t.name || "M").charAt(0)}
      </div>
      <div class="small">${t.name}</div>
    </div>
  `).join("");
}

function populateMessageTargets(){
  const select = document.getElementById("messageTarget");
  const names = [...new Set([...defaultTalents.map(t=>t.name), ...(profile && profile.name ? [profile.name] : [])])];
  select.innerHTML = names.map(n=>`<option value="${n}">${n}</option>`).join("");
}

function sendMessage(voiceUrl=''){
  const target = document.getElementById("messageTarget").value;
  const text = document.getElementById("messageText").value.trim();
  const file = document.getElementById("messageFile").files[0];
  const from = profile?.name || "Moi";

  if(!text && !file && !voiceUrl) return;

  function finish(fileUrl="", fileName=""){
    messages.unshift({
      id: Date.now(),
      from,
      to: target,
      text,
      fileUrl,
      fileName,
      voiceUrl
    });
    document.getElementById("messageText").value = "";
    document.getElementById("messageFile").value = "";
    addNotif("Nouveau message envoyé");
    save();
    renderMessages();
    renderNotifBadge();
  }

  if(file){
    const reader = new FileReader();
    reader.onload = e => finish(e.target.result, file.name);
    reader.readAsDataURL(file);
  }else{
    finish();
  }
}

function renderMessages(){
  const box = document.getElementById("messagesList");
  box.innerHTML = messages.length ? messages.map(m=>`
    <div class="list-item">
      <div><b>${m.from}</b> → <b>${m.to}</b></div>
      ${m.text ? `<div style="margin-top:6px">${m.text}</div>` : ""}
      ${m.fileUrl ? `<a class="file-link" href="${m.fileUrl}" download="${m.fileName || 'fichier'}">${m.fileName || 'Fichier'}</a>` : ""}
      ${m.voiceUrl ? `<div style="margin-top:8px"><audio controls style="width:100%"><source src="${m.voiceUrl}"></audio></div>` : ""}
    </div>
  `).join("") : `<div class="card empty">Aucun message.</div>`;
}

async function toggleRecord(){
  const btn = document.getElementById("recordBtn");
  const status = document.getElementById("recordStatus");

  if(!recording){
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      alert("Enregistrement non supporté sur cet appareil.");
      return;
    }
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];

      mediaRecorder.ondataavailable = e => {
        if(e.data.size > 0) audioChunks.push(e.data);
      };

      mediaRecorder.onstop = () => {
        const blob = new Blob(audioChunks, {type:'audio/webm'});
        const url = URL.createObjectURL(blob);
        sendMessage(url);
        stream.getTracks().forEach(track=>track.stop());
      };

      mediaRecorder.start();
      recording = true;
      btn.textContent = "⏹ Stop";
      status.textContent = "Enregistrement en cours...";
    }catch(e){
      alert("Micro refusé ou indisponible.");
    }
  }else{
    mediaRecorder.stop();
    recording = false;
    btn.textContent = "🎤 Vocal";
    status.textContent = "";
  }
}

function renderAll(){
  renderFeed();
  renderNotifications();
  renderProfile();
  renderProfileLists();
  renderDiscover();
  renderMap();
  renderMessages();
  renderStories();
  renderNotifBadge();
  populateMessageTargets();
  nav(currentSection);
}

showProfileTab('overview');
renderAll();
</script>
